name: innovatech

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  # Repos de ECR (no son secretos, solo nombres)
  ECR_REPO_FRONTEND: tienda-frontend
  ECR_REPO_BACKEND: tienda-backend
  ECR_REPO_DB: tienda-db
  ECR_REPO_DESPACHO: tienda-despacho

jobs: 
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # ---------- FRONTEND ----------
      - name: Build & push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}

      # ---------- BACKEND ----------
      - name: Build & push BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd backend
          docker build -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG}

      # ---------- DB (opcional) ----------
      - name: Build & push DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd db
          docker build -t $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG} .
          docker push $ECR_REGISTRY/${ECR_REPO_DB}:${IMAGE_TAG}

      # ---------- Instalar kubectl ----------
      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      # ---------- Configurar kubeconfig de EKS ----------
      - name: Configurar kubeconfig para EKS
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          kubectl config current-context

      # ---------- Aplicar manifests base ----------
      - name: Aplicar manifests base (namespace, DB, servicios)
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl apply -f k8s/ -n $EKS_NAMESPACE

      # ---------- Actualizar BACKEND en EKS ----------
      - name: Actualizar BACKEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          # 1. Aplicamos toda la carpeta con los HPAs corregidos
          kubectl apply -f k8s/ -n $EKS_NAMESPACE

          # 2. Forzamos un reinicio limpio para vaciar contenedores colgados
          kubectl rollout restart deployment/ventas-backend -n $EKS_NAMESPACE
          kubectl rollout restart deployment/despacho-backend -n $EKS_NAMESPACE

          # 3. Forzamos la actualización de la imagen para el Backend de Ventas
          kubectl set image deployment/ventas-backend \
            backend=$ECR_REGISTRY/tienda-backend:eks-v1 \
            -n $EKS_NAMESPACE
          
          # 4. Forzamos la actualización de la imagen para el Backend de Despachos
          kubectl set image deployment/despacho-backend \
            backend=$ECR_REGISTRY/tienda-despacho:eks-v1 \
            -n $EKS_NAMESPACE

      # ---------- Actualizar FRONTEND en EKS ----------
      - name: Actualizar FRONTEND en EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          # Los archivos ya se aplicaron en bloque arriba. Solo actualizamos la imagen con su TAG dinámico:
          kubectl set image deployment/tienda-frontend \
            frontend=$ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} \
            -n $EKS_NAMESPACE

      # ---------- Ver estado final ----------
      - name: Ver pods y servicios
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          kubectl get pods -n $EKS_NAMESPACE
          kubectl get svc -n $EKS_NAMESPACE
          kubectl get hpa -n $EKS_NAMESPACE || true

      # ---------- Extraer Evidencias para el Informe ----------
      - name: Extraer Evidencias de Variables y Logs
        env:
          EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE }}
        run: |
          echo "=== 1. VARIABLES DE ENTORNO (IE4) ==="
          kubectl describe deployment ventas-backend -n $EKS_NAMESPACE
          
          echo "=== 2. LOGS DE BACKEND (IE6 y IE7) ==="
          kubectl logs deployment/ventas-backend -n $EKS_NAMESPACE --tail=30 || true