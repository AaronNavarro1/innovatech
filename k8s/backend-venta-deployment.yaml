apiVersion: apps/v1
kind: Deployment
metadata:
  name: ventas-backend
  namespace: innovatech-despachos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ventas-backend
  template:
    metadata:
      labels:
        app: ventas-backend
    spec:
      containers:
        - name: backend
          image: 307303830111.dkr.ecr.us-east-1.amazonaws.com/tienda-backend:eks-v1
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: "tienda-db"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: DB_NAME
              value: "tienda_perritos"
            - name: DB_PORT
              value: "3306"

          # ======= RECURSOS CONFIGURADOS PARA HPA =======
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"